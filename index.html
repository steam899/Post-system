<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekod Jualan - POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-store"></i> MyPOS</a>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-light"><i class="fas fa-home"></i> POS</a>
                <a href="settings.html" class="btn btn-outline-light"><i class="fas fa-cog"></i> Tetapan</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Rekod Jualan</h5>
                <button class="btn btn-success" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
            </div>
            <div class="card-body">
                <input type="text" id="search-sales" class="form-control mb-3" placeholder="Cari No. Resit...">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Tarikh/Masa</th>
                                <th>No. Resit</th>
                                <th>Item Terjual</th>
                                <th>Jumlah (RM)</th>
                            </tr>
                        </thead>
                        <tbody id="sales-table-body">
                            <!-- Sales rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/sales.js"></script>
</body>
</html>
